<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brand Video AI MVP</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <header class="hero">
      <div class="hero-inner">
        <div class="hero-copy">
          <p class="eyebrow" data-i18n="app.eyebrow">AI Brand Video Generator · MVP</p>
          <h1 data-i18n="app.title">品牌 TikTok 短视频脚本 & 视频 Prompt 生成器</h1>
          <p class="subtitle" data-i18n="app.subtitle">
            填写品牌问卷后，AI 自动生成视频大纲。人工审查修改后，再生成适配 OpenAI Sora-2 的英文视频生成 Prompt。
          </p>
        </div>

        <div class="language-switcher" aria-label="Language selector">
          <label for="languageSelect" data-i18n="language.label">语言</label>
          <select id="languageSelect">
            <option value="zh">中文</option>
            <option value="en">English</option>
          </select>
        </div>
      </div>
    </header>

    <main class="layout">
      <section class="card">
        <div class="section-header">
          <span class="step" data-i18n="step.one">Step 1</span>
          <h2 data-i18n="section.questionnaire">品牌问卷输入</h2>
        </div>

        <form id="questionnaireForm" class="form-grid">
          <label>
            <span data-i18n="form.brandName">品牌名称</span>
            <input
              id="brandName"
              required
              data-i18n-placeholder="placeholder.brandName"
              placeholder="例如：Luna Bloom"
            />
          </label>

          <label>
            <span data-i18n="form.industry">行业 / 业务类型</span>
            <input
              id="industry"
              required
              data-i18n-placeholder="placeholder.industry"
              placeholder="例如：咖啡店 / 珠宝 / 健身房"
            />
          </label>

          <label>
            <span data-i18n="form.targetAudience">目标受众</span>
            <input
              id="targetAudience"
              required
              data-i18n-placeholder="placeholder.targetAudience"
              placeholder="例如：18-30 岁学生和年轻上班族"
            />
          </label>

          <label>
            <span data-i18n="form.brandKeywords">品牌关键词（3个形容词，用逗号分隔）</span>
            <input
              id="brandKeywords"
              data-i18n-placeholder="placeholder.brandKeywords"
              placeholder="例如：高级,年轻,环保"
            />
          </label>

          <label>
            <span data-i18n="form.promotionTheme">近期推广主题或活动</span>
            <input
              id="promotionTheme"
              required
              data-i18n-placeholder="placeholder.promotionTheme"
              placeholder="例如：新品发布 / 节日折扣 / 开业活动"
            />
          </label>

          <label>
            <span data-i18n="form.videoLength">视频时长</span>
            <select id="videoLength">
              <option value="15 seconds" data-i18n="duration.15">15 秒</option>
              <option value="15-30 seconds" selected data-i18n="duration.15to30">15-30 秒</option>
              <option value="30 seconds" data-i18n="duration.30">30 秒</option>
            </select>
          </label>

          <button type="submit" id="generateOutlineButton" data-i18n="button.generateOutline">生成视频大纲</button>
        </form>
      </section>

      <section class="card" id="outlineSection" hidden>
        <div class="section-header">
          <span class="step" data-i18n="step.two">Step 2</span>
          <h2 data-i18n="section.reviewOutline">人工审查视频大纲</h2>
        </div>

        <div id="outlineMeta" class="notice"></div>

        <label>
          <span data-i18n="outline.hook">Hook（前3秒开场）</span>
          <textarea id="hookInput" rows="2"></textarea>
        </label>

        <label>
          <span data-i18n="outline.summary">视频结构概述</span>
          <textarea id="summaryInput" rows="3"></textarea>
        </label>

        <div class="inline-title">
          <h3 data-i18n="outline.scenes">分镜场景</h3>
          <span data-i18n="outline.sceneHelp">可以直接修改每个场景描述和字幕</span>
        </div>
        <div id="scenesContainer" class="scenes"></div>

        <label>
          <span data-i18n="outline.voiceover">完整配音 / 字幕文案</span>
          <textarea id="voiceoverInput" rows="4"></textarea>
        </label>

        <label>
          <span data-i18n="outline.music">推荐背景音乐风格</span>
          <input id="musicInput" />
        </label>

        <label>
          <span data-i18n="outline.hashtags">TikTok Hashtags（用逗号分隔）</span>
          <input id="hashtagsInput" />
        </label>

        <label>
          <span data-i18n="outline.notes">创意备注</span>
          <textarea id="notesInput" rows="3"></textarea>
        </label>

        <label>
          <span data-i18n="outline.targetTool">目标视频工具</span>
          <select id="targetTool">
            <option value="sora-2" selected>OpenAI Sora-2</option>
          </select>
        </label>

        <div class="actions">
          <button id="approveButton" data-i18n="button.approveGeneratePrompts">通过并生成视频 Prompt</button>
          <button id="regenerateButton" class="secondary" data-i18n="button.regenerateOutline">重新生成大纲</button>
        </div>
      </section>

      <section class="card" id="promptSection" hidden>
        <div class="section-header">
          <span class="step" data-i18n="step.three">Step 3</span>
          <h2 data-i18n="section.promptsAndVideo">视频生成 Prompt & 视频片段生成</h2>
        </div>

        <div class="tool-row">
          <button id="copyPromptsButton" class="secondary" type="button" data-i18n="button.copyPrompts">复制全部 Prompt</button>
          <span class="muted" data-i18n="prompt.help">生成 Prompt 后，每个 Scene 下方会出现“生成这个 Scene 的视频片段”按钮。</span>
        </div>

        <div id="promptMeta" class="notice"></div>
        <div id="promptsContainer" class="prompts"></div>
      </section>
    </main>

    <div id="toast" class="toast" hidden></div>

    <script src="/static/app.js?v=bilingual-no-defaults-v1"></script>
  </body>
</html>
